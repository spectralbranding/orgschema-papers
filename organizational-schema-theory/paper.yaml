abstract: >
  We introduce the Organizational Schema Theory (OST): a Design Science
  Research methodology that applies Test-Driven Development principles
  to business operations. Businesses are specified as a six-level
  cascade of contracts -- customer experience, signal requirements,
  process contracts, procedures, input specifications, sourcing -- in
  which each level functions as the acceptance test for the level below
  it. Specifications are written in YAML, version-controlled, and
  validated by a CI/CD pipeline that traces every operational parameter
  back to the customer experience justification it serves. We
  demonstrate the methodology with Spectra Coffee, a six-product
  reference deployment with full cascade specification and CI/CD
  passing on every commit. We position orgschema against ten adjacent
  frameworks (TDD, QFD, Service Blueprinting, JTBD, Backward Design,
  Lean Pull, Quality Management, DSR, VSM, Declarative BPM) and a
  twelve-property structural-comparison matrix across seven adjacent
  methodologies (BDD, BPMN, ISO 9001, IaC, Service Blueprint,
  OKR + SLO, OST).

claims:
  - id: "C1"
    statement: >
      Business operations can be specified as a six-level cascade
      where each level functions as the acceptance test for the level
      below it.
    evidence: "Spectra Coffee reference deployment; structural property matrix"
    status: demonstrated
  - id: "C2"
    statement: >
      Customer-experience traceability for organizational
      specifications is computable, not only documented in prose.
    evidence: "Spectra Coffee CI/CD pipeline; orphan-element detection in validator"
    status: demonstrated
  - id: "C3"
    statement: >
      Orgschema is the first methodology to combine all twelve
      structural design properties (machine-readable customer
      requirements, machine-readable process specs, formal
      satisfaction proofs, orphan detection, version control,
      continuous validation, non-human customer support, supply chain
      in scope, schema/data separation, forkability, and perceptual
      dimensions as upper-level language) under one chain of artifacts.
    evidence: "Twelve-property structural property matrix in section 'Positioning Against Prior Art'"
    status: design_claim
  - id: "C4"
    statement: >
      Industrial-scale validation of the methodology remains future
      work. The current evidence is one reference deployment.
    evidence: "Spectra Coffee single instantiation"
    status: limitation_acknowledged

methodology:
  type: design_science_research
  framework: "Hevner et al. (2004) DSR + Mullarkey-Hevner (2019) eDSR"
  artifact: "The methodology itself, not the Spectra Coffee demonstration"
  evaluation: "Formative Evaluation of Design Science (FEDS); five expert walk-throughs; technical validation via automated schema checking"
  validity_types_addressed:
    - "Instrument validity"
    - "Purpose validity"

