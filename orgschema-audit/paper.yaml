claims:
  - id: P1
    type: proposition
    description: >
      Cascade-Position Prioritization: specification failures at higher levels
      (closer to customer experience) are more consequential than failures at
      lower levels (closer to sourcing), regardless of symptom severity.
    status: proposed
    falsification: >
      P1 is falsified if controlled field studies show that organizations
      prioritizing by symptom severity or financial exposure achieve equal or
      better operational outcomes than those prioritizing by cascade position.

  - id: P2
    type: proposition
    description: >
      Bidirectional Traceability Completeness: any operational parameter that
      cannot be traced upward to a customer experience justification is
      specification waste; any customer experience goal that cannot be traced
      downward to a verifiable operational implementation is specification debt.
    status: proposed
    falsification: >
      P2 is falsified if organizations with complete bidirectional traceability
      (per audit criteria) show no improvement in operational coherence
      compared to organizations with partial traceability.

