abstract: >
  The brand-portfolio architecture literature has produced a mature taxonomy
  of relationships between brands but no theory of which organizational
  layers carry the brand boundary. This paper proposes that brand IS Tier 4
  — the Product specification surface — of the six-tier business
  architecture in Zharnikov (2026ag), projected through an observer
  perceptual filter into observed brand-perception space. Three downstream
  phenomena unify under this single structural identity: multi-brand
  capacity is the firm's tier-level separability profile; failed-brand
  recovery is tier-level salvage of brand-agnostic infrastructure under
  brand-bound failure; and marketing, advertising, and branding are Tier-6
  organizational functions that create, operate, and retire Tier-4
  instances. Seven falsifiable propositions are derived. P1 predicts
  portfolio capacity scales with Tier-3 / Tier-5 / Tier-6 independence
  rather than Business Model diversification. P2 predicts recovery success
  scales with the brand-agnostic substrate preserved through failure. P7
  operationalizes the Aaker-Joachimsthaler Brand Relationship Spectrum as a
  single Tier-3-visibility-in-Tier-4 parameter. The Spectral Brand Theory
  eight-dimension framework (Zharnikov 2026a) supplies the per-instance
  Tier-4 specification. Two diagnostic instruments — the Multi-Brand
  Capacity Diagnostic and the Recovery Salvage Matrix — are sketched for
  empirical validation.

