# DATA_MANIFEST.yaml -- OST Companion: Verification as Operator
# Theory paper -- no empirical data

datasets: []
  # This is a theory paper. The rank-1 (audit) vs full-rank (cascade) algebraic
  # distinction is a formal claim, not an empirical finding. Worked example in
  # the manuscript is illustrative, not data-driven.

empirical_anchors:
  - claim: "Power's (1997) Audit Society diagnosis"
    formalization: "rank-1 projection P_audit"
    note: >
      The paper's central novelty is showing that Power's sociological account of
      the rise of audit as organizational technology has an algebraic
      interpretation: conventional audit reduces to a rank-1 projection on the
      organizational state space. Empirical validation of the rank-1 vs
      full-rank distinction is left to future work.

  - claim: "Beer's (1972, 1984, 1985) Viable System Model"
    formalization: "recursive operators maintaining viability"
    note: >
      VSM is invoked as the prior cybernetic tradition that uses adjacent
      vocabulary (variety attenuation, recursive control) but does not state
      acceptance testing as an algebraic projection identity with explicit rank.

code:
  - name: "Projection simulation script"
    location: "https://github.com/spectralbranding/orgschema-papers/blob/main/verification-as-operator/projection_simulation.py"
    description: "Reproducible Appendix B simulation: 1,000 trials at four noise levels (sigma = .1, .5, 1.0, 2.0) computing undetected-deviation magnitude under rank-1 audit projection vs. full-rank cascade projection. Run with: uv run --with numpy python3 projection_simulation.py."
  - name: "Simulation full outputs"
    location: "https://github.com/spectralbranding/orgschema-papers/blob/main/verification-as-operator/simulation_results.json"
    description: "Full per-noise-level outputs: rank-1 audit and cascade undetected-deviation magnitudes; analytical sqrt(5)*sigma cross-check. Confirms rank-1 audit misses ~90% of total organizational deviation across all noise levels."
  - name: "OST cascade implementation"
    location: "https://github.com/spectralbranding/orgschema-toolkit"
    description: "Reference implementation of the OST cascade architecture (separate repository; not required for the theoretical claim in this paper)."
